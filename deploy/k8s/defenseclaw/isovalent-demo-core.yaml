              readOnly: true
              subPath: kubectl
            - mountPath: /var/run/splunk-cisco-skills
              name: splunk-cisco-credentials
              readOnly: true
            - mountPath: /var/run/thousandeyes
              name: thousandeyes-token
              readOnly: true
            - mountPath: /home/node/.openclaw/edge-proxy.js
              name: openclaw-edge-proxy
              readOnly: true
              subPath: edge-proxy.js
            - mountPath: /tmp
