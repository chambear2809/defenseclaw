            - name: PYTHONPATH
              value: /home/node/.openclaw/splunk-cisco-skills/releases/9bb131a104830b166dc0918b1be89332a7a8ada4/vendor/python:/home/node/.openclaw/splunk-cisco-skills/releases/9bb131a104830b166dc0918b1be89332a7a8ada4/agent
            - name: SPLUNK_CREDENTIALS_FILE
              value: /var/run/splunk-cisco-skills/credentials
            - name: SPLUNK_O11Y_REALM
              value: us1
            - name: SPLUNK_O11Y_TOKEN_FILE
              value: /var/run/splunk-cisco-skills/splunk_o11y_token
            - name: THOUSANDEYES_API_BASE
              value: https://api.thousandeyes.com/v7
            - name: THOUSANDEYES_TOKEN_FILE
              value: /var/run/thousandeyes/token
            - name: SPLUNK_CISCO_SKILLS_MCP_NO_VENV
              value: "1"
            - name: SPLUNK_SKILLS_MCP_ALLOW_MUTATION
              value: "1"
            - name: OPENAI_API_KEY
              value: ""
            - name: BRIDGEIT_OPENAI_PROXY_HOST
              value: 0.0.0.0
            - name: BRIDGEIT_OPENAI_PROXY_PORT
              value: "8787"
            - name: BRIDGEIT_OPENAI_PROXY_BYPASS_GUARDRAIL
              value: "true"
            - name: DEFENSECLAW_DISABLE_REDACTION
              value: "1"
          envFrom:
            - secretRef:
                name: openclaw-secrets
                optional: true
          ports:
            - containerPort: 18789
              name: gateway
              protocol: TCP
            - containerPort: 8787
              name: bridgeit
              protocol: TCP
          livenessProbe:
