              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: openclaw-data
            - mountPath: /home/node/.openclaw/workspace/AGENTS.md
              name: openclaw-config
              readOnly: true
              subPath: AGENTS.md
            - mountPath: /usr/local/bin/defenseclaw-runtime-evidence
