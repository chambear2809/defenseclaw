apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: openclaw
  name: openclaw-config
  namespace: defenseclaw
data:
  AGENTS.md: |
    # OpenClaw Test Lab

    This gateway is running inside the single-use Kubernetes test lab. It is the DefenseClaw autonomous operator runtime.

    Priorities:
    - Keep changes scoped to the lab unless explicitly asked otherwise.
    - Preserve telemetry flowing to the local Splunk OpenTelemetry collector.
    - Prefer concise diagnostics and direct verification commands.

    Runtime Access:
    - Kubernetes: use the in-cluster service account and kubectl for investigation. Start with `kubectl auth can-i --list`, `kubectl get ns`, `kubectl -n teastore get deploy,svc,pods -o wide`, `kubectl -n teastore logs deploy/<name> --tail=100`, and `kubectl top pods -A` when metrics are available. Do not read Kubernetes Secrets or perform mutating kubectl commands unless the operator explicitly approves the exact action. The only demo mutation RBAC granted to this runtime is `get`, `patch`, and `update` on `deployment/teastore-webui-v1` in namespace `teastore`.
    - MCP-first TeaStore recording script: for the live recording surface, collect external evidence through MCP tools, not helper scripts. Use `splunk-observability-cloud` for O11y evidence and `thousandeyes-mcp` for ThousandEyes evidence. The only non-MCP exception is read-only Kubernetes shell because no Kubernetes MCP server is loaded in this lab.
    - TeaStore MCP sequence:
      1. Splunk O11y alert search: call `splunk-observability-cloud__o11y_search_alerts_or_incidents` with exactly one top-level `params` object, for example `{"params":{"time_range":{"start":"-2h","stop":"now"},"detector_id":"HI-D6XZA4AE","include_inactive":false,"limit":10}}`.
      2. Splunk O11y APM context: `splunk-observability-cloud__o11y_get_apm_environments({"params":{"environment_name":"teastore","time_range":{"start":"-24h","stop":"now"}}})`, `splunk-observability-cloud__o11y_get_apm_services({"params":{"environment_name":"teastore","time_range":{"start":"-24h","stop":"now"}}})`, `splunk-observability-cloud__o11y_get_apm_service_latency({"params":{"service_name":"teastore-webui-v1","environment_name":"teastore","time_range":{"start":"-24h","stop":"now"}}})`, and provider-safe `splunk-observability-cloud__o11y_get_apm_service_errors_and_requ({"params":{"service_name":"teastore-webui-v1","environment_name":"teastore","time_range":{"start":"-24h","stop":"now"}}})`.
      3. Kubernetes read-only health: use `exec` only for `kubectl -n teastore get deploy,svc,pods -o wide`; do not read Secrets or mutate resources.
      4. ThousandEyes reuse check: `thousandeyes-mcp__list_network_app_synthetics_tests({"name":"defenseclaw-demo-teastore-k8s","type":"http-server","target":"teastore-webui","detail":"compact","page_size":20})`; the validated live result is test ID `8597876`.
      5. ThousandEyes agent check: `thousandeyes-mcp__list_cloud_enterprise_agents({"agent_type":"enterprise","enabled":true})`; filter `agentName` values that start with `te-agent-aleccham`. Do not use Endpoint Agent tools for the K8s Enterprise Agent.
      6. Policy gates: summarize DefenseClaw tool-hook decisions shown on these MCP/read-only tool calls. Do not call ThousandEyes create/update/delete, Instant Test, or Kubernetes mutation tools unless the operator explicitly approves the exact action and rollback.
    - Governed TeaStore Plan A v2: if the operator explicitly approves "Plan A v2" in this OpenClaw session, the exact allowed mutation is to patch only namespace `teastore`, deployment `teastore-webui-v1`, container `teastore-webui-v1`; increase the memory limit to `4Gi`; keep requests at `cpu=500m,memory=1Gi`; tune readiness to initial delay 60s, timeout 10s, failure threshold 6; and add matching liveness with initial delay 120s, timeout 10s, failure threshold 6. Do not change DNS, ThousandEyes targets, Secrets, other deployments, or replicas as part of Plan A v2. The DefenseClaw tool hook must evaluate the exact patch command before execution; if it steers for approval or blocks, stop and surface the policy decision.
    - Governed TeaStore Plan A v2 rollback: after explicit rollback approval, restore the current baseline with `kubectl -n teastore patch deployment teastore-webui-v1 --type=strategic -p '{"spec":{"template":{"spec":{"containers":[{"name":"teastore-webui-v1","resources":{"requests":{"cpu":"500m","memory":"1Gi"},"limits":{"cpu":"1","memory":"3Gi"}},"readinessProbe":{"httpGet":{"path":"/tools.descartes.teastore.webui/rest/ready/isready","port":8080},"initialDelaySeconds":0,"periodSeconds":10,"timeoutSeconds":5,"failureThreshold":6},"livenessProbe":null}]}}}}'`, then `kubectl -n teastore rollout status deployment/teastore-webui-v1 --timeout=180s`.
    - ThousandEyes: use the `thousandeyes-mcp` MCP server for read-only evidence. Never replace the token with placeholders for live reads, and never print token contents. Require explicit approval before any ThousandEyes write/delete/Instant Test action because those tools mutate state and/or consume ThousandEyes units.
    - Splunk Observability Cloud: use the `splunk-observability-cloud` MCP server for detector, incident, APM topology, latency, error, and request evidence. Include service names, environments, trace IDs, detector state, and relevant time windows in the analysis.
    - Prefer the loaded `splunk-cisco-skills` MCP server for ThousandEyes and Splunk setup workflows when it exposes the needed skill scripts. Use direct API reads only if the required MCP tool is unavailable and the operator approves the fallback.
  runtime-evidence.py: |
    #!/usr/bin/env python3
    """Collect redacted, read-only DefenseClaw runtime evidence."""

    from __future__ import annotations

    import argparse
    import json
    import os
    import time
    import urllib.error
    import urllib.parse
    import urllib.request
    from typing import Any

    TEASTORE_INTERNAL_URL = "http://teastore-webui.teastore.svc.cluster.local:8080/tools.descartes.teastore.webui/"
    TEASTORE_WEBUI_DEPLOYMENT = "teastore-webui-v1"
    TEASTORE_WEBUI_CONTAINER = "teastore-webui-v1"
    TEASTORE_WEBUI_READY_PATH = "/tools.descartes.teastore.webui/rest/ready/isready"
    ENTERPRISE_WORKFLOW_ID = "enterprise-k8s-thousandeyes"
    TEASTORE_PLAN_A_V2_PATCH_PAYLOAD: dict[str, Any] = {
        "spec": {
            "template": {
                "spec": {
                    "containers": [
                        {
                            "name": TEASTORE_WEBUI_CONTAINER,
                            "resources": {
                                "requests": {"cpu": "500m", "memory": "1Gi"},
                                "limits": {"cpu": "1", "memory": "4Gi"},
                            },
                            "readinessProbe": {
                                "httpGet": {"path": TEASTORE_WEBUI_READY_PATH, "port": 8080},
                                "initialDelaySeconds": 60,
                                "periodSeconds": 10,
                                "timeoutSeconds": 10,
                                "failureThreshold": 6,
                            },
                            "livenessProbe": {
                                "httpGet": {"path": TEASTORE_WEBUI_READY_PATH, "port": 8080},
                                "initialDelaySeconds": 120,
                                "periodSeconds": 10,
                                "timeoutSeconds": 10,
                                "failureThreshold": 6,
                            },
                        }
                    ]
                }
            }
        }
    }
    TEASTORE_PLAN_A_V2_PATCH_COMMAND = (
        f"kubectl -n teastore patch deployment {TEASTORE_WEBUI_DEPLOYMENT} --type=strategic "
        f"-p '{json.dumps(TEASTORE_PLAN_A_V2_PATCH_PAYLOAD, separators=(',', ':'))}'"
    )

    DEMO_INSPECT_STEPS: dict[str, dict[str, Any]] = {
        "read-k8s-health": {
            "id": "agent-read-k8s-health",
            "phase": "investigate",
            "action_class": "read-only",
            "request": {
                "tool": "shell",
                "args": {"command": "kubectl -n teastore get deploy,svc,pods -o wide"},
            },
        },
        "thousandeyes-query": {
            "id": "agent-query-thousandeyes",
            "phase": "investigate",
            "action_class": "read-only",
            "request": {
                "tool": "mcp__thousandeyes-mcp__list_network_app_synthetics_tests",
                "args": {
                    "name": "defenseclaw-demo-teastore-k8s",
                    "type": "http-server",
                    "target": "teastore-webui",
                    "detail": "compact",
                    "page_size": 20,
                },
            },
        },
        "thousandeyes-create": {
            "id": "agent-create-thousandeyes-test",
            "phase": "verify",
            "action_class": "external-write",
            "request": {
                "tool": "mcp__thousandeyes-mcp__create_synthetic_test",
                "approval_surface": "native",
                "args": {
                    "mcp_server": "thousandeyes-mcp",
                    "mcp_tool": "create_synthetic_test",
                    "arguments": {
                        "testName": "defenseclaw-demo-teastore-k8s",
                        "url": TEASTORE_INTERNAL_URL,
                        "interval": 60,
                        "enabled": True,
                        "alertsEnabled": True,
                        "agents": [{"agentId": "${THOUSANDEYES_AGENT_ID}"}],
                        "desiredStatusCode": "200",
                    },
                },
            },
        },
        "k8s-remediation": {
            "id": "agent-safe-k8s-remediation",
            "phase": "remediate",
            "action_class": "mutation",
            "request": {
                "tool": "shell",
                "approval_surface": "native",
                "args": {"command": TEASTORE_PLAN_A_V2_PATCH_COMMAND},
            },
        },
        "dangerous-k8s-delete": {
            "id": "agent-dangerous-k8s-delete",
            "phase": "contain",
            "action_class": "destructive",
            "request": {
                "tool": "shell",
                "args": {"command": "kubectl delete pods --all -n defenseclaw"},
            },
        },
    }


    def _load_token(path: str | None) -> str:
        if not path:
            return ""
        try:
            with open(path, "r", encoding="utf-8") as handle:
                return handle.read().strip()
        except OSError:
            return ""


    def _request(
        method: str,
        url: str,
        headers: dict[str, str],
        body: dict[str, Any] | None = None,
        token: str = "",
        timeout: float = 20.0,
    ) -> tuple[int | None, dict[str, Any]]:
        data = json.dumps(body).encode("utf-8") if body is not None else None
        request = urllib.request.Request(url, data=data, headers=headers, method=method)
        try:
            with urllib.request.urlopen(request, timeout=timeout) as response:
                raw = response.read().decode("utf-8", "replace")
                return response.status, json.loads(raw) if raw else {}
        except urllib.error.HTTPError as exc:
            raw = exc.read().decode("utf-8", "replace")
            if token:
                raw = raw.replace(token, "<redacted>")
            return exc.code, {"error": raw[:500]}
        except Exception as exc:  # pragma: no cover - runtime diagnostic guard
            message = str(exc)
            if token:
                message = message.replace(token, "<redacted>")
            return None, {"error": message[:500]}


    def _defenseclaw_api_base() -> str:
        explicit = os.environ.get("DEFENSECLAW_API_BASE")
        if explicit:
            return explicit.rstrip("/")
        host = os.environ.get("DEFENSECLAW_SERVICE_HOST") or "defenseclaw.defenseclaw.svc.cluster.local"
        port = os.environ.get("DEFENSECLAW_SERVICE_PORT_API") or os.environ.get("DEFENSECLAW_SERVICE_PORT") or "18970"
        return f"http://{host}:{port}"


    def _inspect_headers(step: dict[str, Any], token: str) -> dict[str, str]:
        headers = {
            "Content-Type": "application/json",
            "X-DefenseClaw-Client": "openclaw-runtime-evidence",
            "X-DefenseClaw-Workflow-ID": ENTERPRISE_WORKFLOW_ID,
            "X-DefenseClaw-Step-ID": str(step.get("id") or ""),
            "X-DefenseClaw-Phase": str(step.get("phase") or ""),
            "X-DefenseClaw-Action-Class": str(step.get("action_class") or ""),
        }
        if token:
            headers["Authorization"] = "Bearer " + token
        return headers


    def _summarize_agent_control(value: Any) -> dict[str, Any] | None:
        if not isinstance(value, dict):
            return None
        keys = (
            "action",
            "agent_name",
            "confidence",
            "control_id",
            "control_name",
            "enabled",
            "fail_mode",
            "is_safe",
            "matched",
            "reason",
            "stage",
            "steering_message",
            "step_name",
            "step_type",
        )
        return {key: value.get(key) for key in keys if key in value}


    def _summarize_inspect_verdict(status: int | None, payload: dict[str, Any]) -> dict[str, Any]:
        agent_control = _summarize_agent_control(payload.get("agent_control"))
        summary = {
            "http_status": status,
            "ok": status == 200 and not payload.get("error"),
            "action": payload.get("action"),
            "raw_action": payload.get("raw_action") or payload.get("action"),
            "would_block": bool(payload.get("would_block")),
            "severity": payload.get("severity"),
            "target": payload.get("target"),
            "decision_evidence": payload.get("decision_evidence"),
            "agent_control": agent_control,
        }
        if payload.get("error"):
            summary["error"] = payload.get("error")
        return summary


    def _inspect_tool(step: dict[str, Any]) -> dict[str, Any]:
        token = os.environ.get("OPENCLAW_GATEWAY_TOKEN", "").strip()
        endpoint = _defenseclaw_api_base().rstrip("/") + "/api/v1/inspect/tool"
        status, payload = _request(
            "POST",
            endpoint,
            _inspect_headers(step, token),
            step["request"],
            token=token,
            timeout=10.0,
        )
        return {
            "step_id": step["id"],
            "mode": "inspect-only",
            "executed": False,
            **_summarize_inspect_verdict(status, payload if isinstance(payload, dict) else {}),
        }


    def _run_demo_inspect(selection: str) -> dict[str, Any]:
        if selection == "all":
            names = [
                "read-k8s-health",
                "thousandeyes-query",
                "thousandeyes-create",
                "k8s-remediation",
                "dangerous-k8s-delete",
            ]
        else:
            names = [selection]
        missing = [name for name in names if name not in DEMO_INSPECT_STEPS]
        if missing:
            return {
                "mode": "inspect-only",
                "ok": False,
                "executed": False,
                "errors": [f"unknown demo inspect step: {', '.join(missing)}"],
                "available": sorted(DEMO_INSPECT_STEPS),
            }
        results = [_inspect_tool(DEMO_INSPECT_STEPS[name]) for name in names]
        return {
            "mode": "inspect-only",
            "ok": all(item.get("ok") for item in results),
            "executed": False,
            "defenseclaw_api_base": _defenseclaw_api_base(),
            "results": results,
        }


    def _summarize_thousandeyes(test_id: str) -> dict[str, Any]:
        token = _load_token(os.environ.get("THOUSANDEYES_TOKEN_FILE", "/var/run/thousandeyes/token"))
        base = os.environ.get("THOUSANDEYES_API_BASE", "https://api.thousandeyes.com/v7").rstrip("/")
        if not token:
            return {"ok": False, "error": "ThousandEyes token file is missing or empty"}

        headers = {"Authorization": "Bearer " + token, "Accept": "application/json"}
        test_status, test_payload = _request("GET", f"{base}/tests/http-server/{test_id}", headers, token=token)
        test = test_payload.get("test", test_payload) if isinstance(test_payload, dict) else {}
        agents = test.get("agents") if isinstance(test, dict) and isinstance(test.get("agents"), list) else []
        summarized_agents = [
            {
                "agentId": agent.get("agentId"),
                "agentName": agent.get("agentName") or agent.get("name"),
            }
            for agent in agents[:5]
            if isinstance(agent, dict)
        ]

        result_status, result_payload = _request(
            "GET",
            f"{base}/test-results/{test_id}/http-server",
            headers,
            token=token,
        )
        results = (
            result_payload.get("results")
            if isinstance(result_payload, dict) and isinstance(result_payload.get("results"), list)
            else []
        )
        latest = max(results, key=lambda item: item.get("date", "")) if results else {}
        latest_agent = latest.get("agent") if isinstance(latest.get("agent"), dict) else {}

        return {
            "ok": test_status == 200 and result_status == 200,
            "test": {
                "http_status": test_status,
                "id": test.get("testId") or test.get("id"),
                "name": test.get("testName") or test.get("name"),
                "url": test.get("url"),
                "enabled": test.get("enabled"),
                "agents": summarized_agents,
                "error": test_payload.get("error") if isinstance(test_payload, dict) else None,
            },
            "results": {
                "http_status": result_status,
                "count": len(results),
                "latest": {
                    "date": latest.get("date"),
                    "responseCode": latest.get("responseCode"),
                    "errorType": latest.get("errorType"),
                    "errorDetails": latest.get("errorDetails"),
                    "agentId": latest_agent.get("agentId"),
                    "agentName": latest_agent.get("agentName") or latest_agent.get("name"),
                },
                "error": result_payload.get("error") if isinstance(result_payload, dict) else None,
            },
        }


    def _extract_items(payload: dict[str, Any]) -> list[dict[str, Any]]:
        items = payload.get("results") or payload.get("detectors") or payload.get("data") or []
        if isinstance(items, dict):
            items = list(items.values())
        return [item for item in items if isinstance(item, dict)] if isinstance(items, list) else []


    def _extract_list(payload: Any) -> list[dict[str, Any]]:
        if isinstance(payload, list):
            return [item for item in payload if isinstance(item, dict)]
        if isinstance(payload, dict):
            return _extract_items(payload)
        return []


    def _incident_is_active(incident: dict[str, Any]) -> bool:
        for key in ("active", "isActive"):
            value = incident.get(key)
            if isinstance(value, bool):
                return value
        state = str(
            incident.get("status")
            or incident.get("state")
            or incident.get("incidentStatus")
            or incident.get("eventType")
            or ""
        ).strip().lower()
        return state in {"active", "open", "triggered", "firing"}


    def _severity_name(value: Any) -> str | None:
        if isinstance(value, str) and value.strip():
            normalized = value.strip().upper()
            if normalized in {"INFO", "WARNING", "MINOR", "MAJOR", "CRITICAL"}:
                return normalized.title()
        return None


    def _highest_severity(values: list[str | None]) -> str | None:
        rank = {"Info": 1, "Warning": 2, "Minor": 3, "Major": 4, "Critical": 5}
        candidates = [value for value in values if value in rank]
        return max(candidates, key=lambda value: rank[value]) if candidates else None


    def _summarize_o11y_detector(detector_id: str, realm: str) -> dict[str, Any]:
        token = _load_token(os.environ.get("SPLUNK_O11Y_TOKEN_FILE", "/var/run/splunk-cisco-skills/splunk_o11y_token"))
        if not token:
            return {"ok": False, "error": "Splunk O11y token file is missing or empty"}

        base = f"https://api.{realm}.observability.splunkcloud.com"
        headers = {
            "X-SF-TOKEN": token,
            "Content-Type": "application/json",
            "Accept": "application/json",
        }
        detector_status, detector_payload = _request(
            "GET",
            f"{base}/v2/detector/{urllib.parse.quote(detector_id)}",
            headers,
            token=token,
        )
        incidents_status, incidents_payload = _request(
            "GET",
            f"{base}/v2/detector/{urllib.parse.quote(detector_id)}/incidents",
            headers,
            token=token,
        )
        detector = detector_payload if isinstance(detector_payload, dict) else {}
        incidents = _extract_list(incidents_payload)
        active_incidents = [item for item in incidents if _incident_is_active(item)]
        rule_severities = [
            _severity_name(rule.get("severity"))
            for rule in detector.get("rules", [])
            if isinstance(rule, dict)
        ]
        incident_severities = [_severity_name(item.get("severity")) for item in active_incidents]

        return {
            "ok": detector_status == 200 and incidents_status == 200,
            "realm": realm,
            "detector": {
                "http_status": detector_status,
                "id": detector.get("id") or detector_id,
                "name": detector.get("name"),
                "status": detector.get("status"),
                "tags": detector.get("tags") if isinstance(detector.get("tags"), list) else [],
                "metrics": detector.get("sf_metricsInObjectProgramText") or [],
                "rule_severities": [severity for severity in rule_severities if severity],
                "error": detector.get("error"),
            },
            "incidents": {
                "http_status": incidents_status,
                "count": len(incidents),
                "active_count": len(active_incidents),
                "active_highest_severity": _highest_severity(incident_severities),
                "error": incidents_payload.get("error") if isinstance(incidents_payload, dict) else None,
            },
        }


    def _summarize_o11y(service: str) -> dict[str, Any]:
        realm = os.environ.get("SPLUNK_O11Y_REALM", "us1")
        token = _load_token(os.environ.get("SPLUNK_O11Y_TOKEN_FILE", "/var/run/splunk-cisco-skills/splunk_o11y_token"))
        if not token:
            return {"ok": False, "error": "Splunk O11y token file is missing or empty"}

        base = f"https://api.{realm}.observability.splunkcloud.com"
        headers = {
            "X-SF-TOKEN": token,
            "Content-Type": "application/json",
            "Accept": "application/json",
        }
        detector_url = f"{base}/v2/detector?" + urllib.parse.urlencode({"limit": 100})
        detector_status, detector_payload = _request("GET", detector_url, headers, token=token)
        detector_items = _extract_items(detector_payload) if isinstance(detector_payload, dict) else []
        needle = service.lower()
        matched = [
            {
                "id": item.get("id"),
                "name": item.get("name") or item.get("label"),
                "disabled": item.get("disabled"),
                "muted": item.get("muted"),
            }
            for item in detector_items
            if needle in json.dumps(item, sort_keys=True).lower()
        ]

        now = int(time.time() * 1000)
        start = now - 60 * 60 * 1000
        topology_status, topology_payload = _request(
            "POST",
            f"{base}/v2/apm/topology",
            headers,
            {"timeRange": f"{start}/{now}"},
            token=token,
        )
        topology_data = topology_payload.get("data") if isinstance(topology_payload, dict) else None

        return {
            "ok": detector_status == 200 and topology_status == 200,
            "realm": realm,
            "detectors": {
                "http_status": detector_status,
                "total": len(detector_items),
                "matched_service": len(matched),
                "matches": matched[:5],
                "error": detector_payload.get("error") if isinstance(detector_payload, dict) else None,
            },
            "apm_topology": {
                "http_status": topology_status,
                "keys": sorted(topology_payload.keys()) if isinstance(topology_payload, dict) else [],
                "data_type": type(topology_data).__name__,
                "data_count": len(topology_data) if isinstance(topology_data, list) else None,
                "error": topology_payload.get("error") if isinstance(topology_payload, dict) else None,
            },
        }


    def main() -> int:
        parser = argparse.ArgumentParser(description=__doc__)
        parser.add_argument("--test-id", default="8597876")
        parser.add_argument("--service", default="teastore-webui")
        parser.add_argument("--o11y-detector-id", help="Read-only Splunk O11y detector and active incident summary.")
        parser.add_argument("--o11y-realm", default=os.environ.get("SPLUNK_O11Y_REALM", "us1"))
        parser.add_argument(
            "--demo-inspect",
            choices=["all", *sorted(DEMO_INSPECT_STEPS)],
            help="Run inspect-only DefenseClaw demo verdict checks without executing any proposed tool call.",
        )
        args = parser.parse_args()
        if args.demo_inspect:
            print(json.dumps(_run_demo_inspect(args.demo_inspect), indent=2, sort_keys=True))
            return 0
        if args.o11y_detector_id:
            print(json.dumps(_summarize_o11y_detector(args.o11y_detector_id, args.o11y_realm), indent=2, sort_keys=True))
            return 0
        evidence = {
            "mode": "read-only",
            "thousandeyes": _summarize_thousandeyes(args.test_id),
            "splunk_o11y": _summarize_o11y(args.service),
        }
        print(json.dumps(evidence, indent=2, sort_keys=True))
        return 0


    if __name__ == "__main__":
        raise SystemExit(main())
