apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: defenseclaw
    app.kubernetes.io/name: defenseclaw
  name: defenseclaw
  namespace: defenseclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: defenseclaw
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        splunk.com/index: defenseclaw
        splunk.com/sourcetype: defenseclaw:otel
      labels:
        app: defenseclaw
        app.kubernetes.io/name: defenseclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
