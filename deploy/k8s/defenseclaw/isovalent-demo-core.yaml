apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: splunk-local
    app.kubernetes.io/name: splunk-local
  name: splunk-local
  namespace: defenseclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: splunk-local
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: splunk-local
        app.kubernetes.io/name: splunk-local
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      containers:
        - name: splunk
          image: 637423309390.dkr.ecr.us-east-1.amazonaws.com/defenseclaw@sha256:20d1433533d039a5da4cb68ea6c8ddb64dd333f0830c5e7e598fe62d01436f63
          imagePullPolicy: IfNotPresent
          env:
            - name: SPLUNK_START_ARGS
              value: --accept-license
            - name: SPLUNK_GENERAL_TERMS
              value: --accept-sgt-current-at-splunk-com
          envFrom:
            - secretRef:
                name: splunk-local-secrets
          ports:
            - containerPort: 8000
              name: web
              protocol: TCP
            - containerPort: 8088
              name: hec
              protocol: TCP
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - >-
                    /opt/splunk-claw-bridge/splunk/bin/bootstrap_local_mode.sh &&
                    curl -sk -u "${SPLUNK_ADMIN_USER:-admin}:${SPLUNK_PASSWORD}"
                    "${SPLUNK_MGMT_URL:-https://127.0.0.1:8089}/services/authorization/roles/${DEFENSECLAW_LOCAL_USERNAME:-defenseclaw_local_user}"
                    -d imported_roles=user
                    -d srchIndexesAllowed=${DEFENSECLAW_INDEX:-defenseclaw_local}
                    -d srchIndexesDefault=${DEFENSECLAW_INDEX:-defenseclaw_local}
                    -d srchJobsQuota=25
                    -d rtSrchJobsQuota=5
                    -d cumulativeSrchJobsQuota=50
                    -d cumulativeRTSrchJobsQuota=10 >/dev/null
          startupProbe:
            tcpSocket:
              port: web
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            tcpSocket:
              port: hec
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - mountPath: /opt/splunk/etc
              name: splunk-etc
            - mountPath: /opt/splunk/var
              name: splunk-var
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: splunk-etc
          persistentVolumeClaim:
            claimName: splunk-local-etc
        - name: splunk-var
          persistentVolumeClaim:
            claimName: splunk-local-var
        - name: tmp
          emptyDir: {}
