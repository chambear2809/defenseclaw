      watcher:
        enabled: true
        skill:
          enabled: true
          take_action: false
          dirs:
            - /home/node/.openclaw/splunk-cisco-skills/releases/9bb131a104830b166dc0918b1be89332a7a8ada4/skills
        plugin:
          enabled: false
          take_action: false
          dirs: []
        mcp:
          take_action: false
    scanners:
