# Live-derived DefenseClaw/OpenClaw lab stack for the isovalent-demo EKS cluster.
# Secret values are intentionally omitted; create the required Secrets first.
# The live runtime uses the correctly spelled defenseclaw namespace.
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    splunk.com/index: defenseclaw
  labels:
    app: defenseclaw
    app.kubernetes.io/name: defenseclaw
  name: defenseclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: autonomous-agent
    app.kubernetes.io/name: defenseclaw
