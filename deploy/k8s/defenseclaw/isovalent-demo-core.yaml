apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: openclaw
  name: openclaw-edge-proxy
  namespace: defenseclaw
data:
  edge-proxy.js: |
    const http = require("node:http");

    const listenHost = process.env.OPENCLAW_EDGE_PROXY_HOST || "0.0.0.0";
    const listenPort = Number.parseInt(process.env.OPENCLAW_EDGE_PROXY_PORT || "18789", 10);
    const gatewayPort = Number.parseInt(process.env.OPENCLAW_GATEWAY_BACKEND_PORT || "18790", 10);
    const bridgeitPort = Number.parseInt(process.env.BRIDGEIT_OPENAI_PROXY_PORT || "8787", 10);

    function targetFor(req) {
      const path = req.url || "/";
      if (path === "/v1" || path.startsWith("/v1/")) {
        return { hostname: "127.0.0.1", port: bridgeitPort };
      }
      return { hostname: "127.0.0.1", port: gatewayPort };
    }

    const server = http.createServer((req, res) => {
      const target = targetFor(req);
      const upstream = http.request(
        {
          hostname: target.hostname,
          port: target.port,
          method: req.method,
          path: req.url,
          headers: { ...req.headers, host: `127.0.0.1:${target.port}` },
        },
        (upstreamRes) => {
          res.writeHead(upstreamRes.statusCode || 502, upstreamRes.headers);
          upstreamRes.pipe(res);
        },
      );
      upstream.on("error", (err) => {
        const body = JSON.stringify({ error: { message: err.message } });
        res.writeHead(502, { "Content-Type": "application/json", "Content-Length": Buffer.byteLength(body) });
        res.end(body);
      });
      req.pipe(upstream);
    });

    server.on("upgrade", (req, socket, head) => {
      const target = targetFor(req);
      const upstream = http.request({
        hostname: target.hostname,
        port: target.port,
        method: req.method,
        path: req.url,
        headers: { ...req.headers, host: `127.0.0.1:${target.port}` },
      });

      upstream.on("upgrade", (upstreamRes, upstreamSocket, upstreamHead) => {
        const statusLine = `HTTP/1.1 ${upstreamRes.statusCode || 101} ${upstreamRes.statusMessage || "Switching Protocols"}`;
        const headerLines = [];
        for (let index = 0; index < upstreamRes.rawHeaders.length; index += 2) {
          headerLines.push(`${upstreamRes.rawHeaders[index]}: ${upstreamRes.rawHeaders[index + 1]}`);
        }
        socket.write(`${[statusLine, ...headerLines].join("\r\n")}\r\n\r\n`);
        if (upstreamHead.length > 0) socket.write(upstreamHead);
        if (head.length > 0) upstreamSocket.write(head);
        upstreamSocket.pipe(socket);
        socket.pipe(upstreamSocket);
      });

      upstream.on("response", (upstreamRes) => {
        socket.write(`HTTP/1.1 ${upstreamRes.statusCode || 502} ${upstreamRes.statusMessage || "Bad Gateway"}\r\nConnection: close\r\n\r\n`);
        upstreamRes.resume();
        socket.destroy();
      });
      upstream.on("error", () => socket.destroy());
      socket.on("error", () => upstream.destroy());
      upstream.end();
    });

    server.listen(listenPort, listenHost, () => {
      console.error(`[openclaw-edge] listening on http://${listenHost}:${listenPort}; /v1 -> ${bridgeitPort}; default -> ${gatewayPort}`);
    });
---
