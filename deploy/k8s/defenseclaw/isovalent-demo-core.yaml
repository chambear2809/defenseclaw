    #!/usr/bin/env node
    "use strict";

    const fs = require("fs");
    const { execFileSync, spawn } = require("child_process");

    const DEFAULT_URL = "https://region-pdx10.api.scs.splunk.com/system/mcp-gateway/v1/";
    const DEFAULT_TOKEN_FILE = "/var/run/splunk-cisco-skills/splunk_o11y_token";
    const DEFAULT_NPM_CACHE = "/tmp/npm-cache";
    const DEFAULT_MCP_REMOTE_CONFIG_DIR = "/tmp/mcp-auth";

    function readToken() {
      const tokenFile = process.env.SPLUNK_O11Y_TOKEN_FILE || DEFAULT_TOKEN_FILE;
      try {
        return fs.readFileSync(tokenFile, "utf8").trim();
      } catch (_) {
        return "";
      }
    }

    function findMcpRemote() {
      try {
        const found = execFileSync("which", ["mcp-remote"], {
          encoding: "utf8",
          stdio: ["ignore", "pipe", "ignore"],
        }).trim().split(/\r?\n/)[0].trim();
        if (found) return { cmd: found, args: [] };
      } catch (_) {
        // Not installed globally; use npx as Splunk's MCP docs recommend.
      }
      return { cmd: "npx", args: ["-y", "mcp-remote"] };
    }

    function envWithWritableNpmCache(extra = {}) {
      const npmCache = process.env.NPM_CONFIG_CACHE || process.env.npm_config_cache || DEFAULT_NPM_CACHE;
      const mcpRemoteConfigDir = process.env.MCP_REMOTE_CONFIG_DIR || DEFAULT_MCP_REMOTE_CONFIG_DIR;
      try {
        fs.mkdirSync(npmCache, { recursive: true });
        fs.mkdirSync(mcpRemoteConfigDir, { recursive: true });
      } catch (_) {
        // Let npm or mcp-remote report the underlying error if /tmp is unexpectedly unavailable.
      }
      return {
        ...process.env,
        MCP_REMOTE_CONFIG_DIR: mcpRemoteConfigDir,
        NPM_CONFIG_CACHE: npmCache,
        NPM_CONFIG_UPDATE_NOTIFIER: "false",
        npm_config_cache: npmCache,
        npm_config_update_notifier: "false",
        ...extra,
      };
    }

    const mcpUrl = process.env.SPLUNK_O11Y_MCP_URL || DEFAULT_URL;
    const realm = process.env.SPLUNK_O11Y_REALM || "us1";
    const token = readToken();

    if (!token) {
      process.stderr.write("splunk-o11y-mcp: token file is missing or empty\n");
      process.exit(1);
    }

    process.env.SPLUNK_O11Y_TOKEN = token;

    const { cmd, args } = findMcpRemote();
    const child = spawn(
      cmd,
      [
        ...args,
        mcpUrl,
        "--transport",
        "http-only",
        "--allow-http",
        "--header",
        "X-SF-REALM:${SPLUNK_O11Y_REALM}",
        "--header",
        "X-SF-TOKEN:${SPLUNK_O11Y_TOKEN}",
      ],
      { stdio: "inherit", env: envWithWritableNpmCache({ SPLUNK_O11Y_REALM: realm }) },
    );

    child.on("error", (err) => {
      process.stderr.write("splunk-o11y-mcp: failed to start mcp-remote: " + err.message + "\n");
      process.exit(1);
    });

    child.on("exit", (code, signal) => {
      if (signal) {
        process.kill(process.pid, signal);
      } else {
        process.exit(code === null ? 0 : code);
      }
    });
