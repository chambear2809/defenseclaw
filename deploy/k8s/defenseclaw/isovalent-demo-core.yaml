    cisco_ai_defense:
      endpoint: https://us.api.inspect.aidefense.security.cisco.com
      api_key_env: CISCO_AI_DEFENSE_API_KEY
      oauth_token_url: https://id.cisco.com/oauth2/default/v1/token
      oauth_basic_env: CISCO_AI_DEFENSE_OAUTH_BASIC
      timeout_ms: 3000
      scan_hook_surface: true
    otel:
      enabled: true
      endpoint: splunk-otel-collector-agent.otel-splunk.svc:4317
      protocol: grpc
      tls:
        insecure: true
      traces:
        enabled: true
      logs:
        enabled: true
      metrics:
        enabled: true
        export_interval_s: 30
      galileo:
