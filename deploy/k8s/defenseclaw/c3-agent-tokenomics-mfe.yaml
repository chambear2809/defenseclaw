apiVersion: apps/v1
kind: Deployment
metadata:
  name: c3-agent-tokenomics-mfe
  namespace: defenseclaw
  labels:
    app.kubernetes.io/name: c3-agent-tokenomics-mfe
    app.kubernetes.io/component: mfe
    app.kubernetes.io/part-of: defenseclaw
    demo.cisco.com/surface: c3-agent-tokenomics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c3-agent-tokenomics-mfe
      app.kubernetes.io/component: mfe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c3-agent-tokenomics-mfe
        app.kubernetes.io/component: mfe
        app.kubernetes.io/part-of: defenseclaw
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mfe
          image: 637423309390.dkr.ecr.us-east-1.amazonaws.com/defenseclaw-c3-tokenomics-mfe:c3-tokenomics-mfe-pragmatic-clarity-20260513210300
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: 0.0.0.0
            - name: MFE_PORT
              value: "3001"
            - name: API_PORT
              value: "8787"
          ports:
            - name: web
              containerPort: 3001
            - name: api
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: c3-agent-tokenomics-mfe
  namespace: defenseclaw
  labels:
    app.kubernetes.io/name: c3-agent-tokenomics-mfe
    app.kubernetes.io/component: mfe
    app.kubernetes.io/part-of: defenseclaw
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: c3-agent-tokenomics-mfe
    app.kubernetes.io/component: mfe
  ports:
    - name: http
      port: 80
      targetPort: web
    - name: api
      port: 8787
      targetPort: api
