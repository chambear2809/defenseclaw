apiVersion: v1
kind: Namespace
metadata:
  name: defenseclaw
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: c3-agent-tokenomics-demo-config
  namespace: defenseclaw
  labels:
    app.kubernetes.io/name: c3-agent-tokenomics-demo
    app.kubernetes.io/component: bff
    app.kubernetes.io/part-of: defenseclaw
    demo.cisco.com/surface: c3-agent-tokenomics
data:
  TOKENOMICS_DEMO_ALLOW_FIXTURE_FALLBACK: "true"
  O11Y_REALM: "us1"
  GALILEO_API_BASE: "https://api.demo-v2.galileocloud.io"
  GALILEO_PROJECT: "defenseclaw-enterprise-ops-20260515"
  GALILEO_PROJECT_ID: "ef0960e1-8744-4019-9faa-103b13f94e0d"
  GALILEO_LOG_STREAM: "defenseclaw-enterprise-ops-20260515"
  GALILEO_LOG_STREAM_ID: "7d3fa020-621d-4164-aa4a-96b600663c92"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c3-agent-tokenomics-demo
  namespace: defenseclaw
  labels:
    app.kubernetes.io/name: c3-agent-tokenomics-demo
    app.kubernetes.io/component: bff
    app.kubernetes.io/part-of: defenseclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c3-agent-tokenomics-demo
      app.kubernetes.io/component: bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c3-agent-tokenomics-demo
        app.kubernetes.io/component: bff
        app.kubernetes.io/part-of: defenseclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: bff
          image: 637423309390.dkr.ecr.us-east-1.amazonaws.com/defenseclaw-c3-tokenomics-demo:c3-tokenomics-20260510044930-f809759-amd64
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - defenseclaw.c3_agent_tokenomics.mock_api
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8787"
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          envFrom:
            - configMapRef:
                name: c3-agent-tokenomics-demo-config
            - secretRef:
                name: c3-agent-tokenomics-galileo
                optional: true
          ports:
            - name: http
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: c3-agent-tokenomics-demo
  namespace: defenseclaw
  labels:
    app.kubernetes.io/name: c3-agent-tokenomics-demo
    app.kubernetes.io/component: bff
    app.kubernetes.io/part-of: defenseclaw
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: c3-agent-tokenomics-demo
    app.kubernetes.io/component: bff
  ports:
    - name: http
      port: 8787
      targetPort: http
